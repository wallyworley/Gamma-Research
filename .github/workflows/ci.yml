name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The canonical schema + config are stdlib-only and must pass with no data
      # stack installed. Run them first so a broken contract fails fast and cheap.
      - name: Contract tests (stdlib only)
        run: python -m unittest discover -s tests -v

      - name: Install data stack
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Re-run with pandas/pyarrow present so parquet/adapter tests (added in
      # M1) are exercised too.
      - name: Full test suite
        run: python -m unittest discover -s tests -v
