openapi: 3.1.0
info:
  title: 'Theta Data'
  description: 'Theta Data'
  version: 2.0.0
servers:
  - url: 'http://127.0.0.1:25510/v2'
security: []
paths:
  '/list/roots/{sec}':
    x-min-subscription: free
    get:
      summary: List Roots
      tags:
        - List
      operationId: get-v2-list-roots
      description: |
        ## Behavior
        A root can be defined as a unique identified for a stock / underlying asset.
        Common terms also include: symbol, ticker, and underlying.
        This endpoint returns all traded roots for a given security type (i.e. stock, index, or option).
        This endpoint is updated overnight.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.

        **List all roots for options**

        [http://127.0.0.1:25510/v2/list/roots/option](http://127.0.0.1:25510/v2/list/roots/option)

        **List all roots for stocks**

        [http://127.0.0.1:25510/v2/list/roots/stock](http://127.0.0.1:25510/v2/list/roots/stock)


        **List all roots for indices**

        [http://127.0.0.1:25510/v2/list/roots/index](http://127.0.0.1:25510/v2/list/roots/index)

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: "The response to the request made. If there is a caught error, the error_type field won't be null."
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: An array of roots / symbols / tickers; ["root"]
                    items:
                      type: string
                    example: ["AAPL"]
      parameters:
        - $ref: '#/components/parameters/use_csv'
        - $ref: '#/components/parameters/sec'
  /list/expirations:
    x-min-subscription: free
    get:
      summary: List Expirations
      tags:
        - List
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: "The response to the request made. If there is a caught error, the error_type field won't be null."
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: An array of expirations formatted as YYYYMMDD; ["date"]
                    items:
                      type: integer
                    example: [20241011,20241018,]
      operationId: get-v2-list-expirations
      description: |
        ## Behavior
        Returns all expirations for an underlying root.
        This endpoint is updated overnight.
        ***Sample data contains partial output of the request as the full response to the request is too large to display on this webpage.***

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/list/expirations?root=AAPL](http://127.0.0.1:25510/v2/list/expirations?root=AAPL)

      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/use_csv'
  /list/strikes:
    x-min-subscription: free
    get:
      summary: List Strikes
      tags:
        - List
      operationId: get-v2-list-strikes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: "The response to the request made. If there is a caught error, the error_type field won't be null."
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: 'An array of strikes that are in 1/10th of a cent. For instance, $140.00 is equivalent to 140000; ["strike"]'
                    items:
                      type: integer
                    example: [140000,142000,]
      description: |
        ## Behavior
        List all strike prices that are traded for an underlying root and expiration date. The strike price in 1/10th of a cent. A $140.00 strike price would be 140000.
        This endpoint is updated overnight.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/list/strikes?root=AAPL&exp=20220930](http://127.0.0.1:25510/v2/list/strikes?root=AAPL&exp=20220930)

      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/exp'
        - $ref: '#/components/parameters/use_csv'
  '/list/dates/{sec}/{req}':
    x-min-subscription: free
    get:
      summary: List Dates
      tags:
        - List
      operationId: get-v2-list-dates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: "The response to the request made. If there is a caught error, the error_type field won't be null."
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: An array of dates formatted as YYYYMMDD; ["date"]
                    items:
                      type: integer
                    example: [20241101,20241104]
      description: |
        ## Behavior
        Lists all dates of data that are available for a given security type, request type, and contract. To list all dates of data available for an option chain, simply omit the ``strike`` and ``right`` parameters and only include the ``exp`` and ``root`` parameters. Make sure you're ``sec`` is ``option``. There is data for at least one of the contracts on the chain for each day on the returned list. It does not mean that every option contract under that expiration will have data.
        This endpoint is updated overnight.
        ***Sample data contains partial output of the request as the full response to the request is too large to display on this webpage.***

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.

        **List all dates for a stock**

        [http://127.0.0.1:25510/v2/list/dates/stock/quote?root=AAPL](http://127.0.0.1:25510/v2/list/dates/stock/quote?root=AAPL)

        **List all dates for an index**

        [http://127.0.0.1:25510/v2/list/dates/index/trade?root=SPX](http://127.0.0.1:25510/v2/list/dates/index/trade?root=SPX)


        **List all dates for an option chain:**

        [http://127.0.0.1:25510/v2/list/dates/option/quote?root=AAPL&exp=20220930](http://127.0.0.1:25510/v2/list/dates/option/quote?root=AAPL&exp=20220930)


        **List all dates for an option**:

        [http://127.0.0.1:25510/v2/list/dates/option/quote?root=AAPL&exp=20220930&strike=140000&right=C](http://127.0.0.1:25510/v2/list/dates/option/quote?root=AAPL&exp=20220930&strike=140000&right=C)

      parameters:
        - $ref: '#/components/parameters/sec'
        - $ref: '#/components/parameters/req'
        - $ref: '#/components/parameters/root'
        - name: exp
          in: query
          description: (Required for options) The expiration date of the option contract formatted as YYYYMMDD.
          schema:
            type: integer
          example: 20220930
        - name: strike
          in: query
          description: (For options only) The strike price in 1/10th of a cent. A $140.00 strike price would be 140000.
          schema:
            type: integer
          example: 140000
        - name: right
          in: query
          description: (For options only) The right of the option. 'C' for call; 'P' for put.
          schema:
            type: string
            enum:
              - C
              - P
            example: C
        - $ref: '#/components/parameters/use_csv'
      requestBody:
        content: {}
  '/list/contracts/option/{req}':
    x-min-subscription: value
    get:
      summary: List Contracts
      tags:
        - List
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["root", "expiration", "strike", "right"].
                    items:
                      type: array
                      properties:
                        root:
                          type: string
                          description: The root symbol or ticker (e.g., "AAPL").
                        expiration:
                          type: integer
                          format: date
                          description: The expiration date in YYYYMMDD format.
                        strike:
                          type: integer
                          description: The strike price (scaled by 1000, e.g., `260000` represents `260.00`).
                        right:
                          type: string
                          enum:
                            - P
                            - C
                          description: The option type ("P" for Put, "C" for Call).
                    example:
                      - ["AAPL", 20230616, 260000, "P"]
                      - ["AAPL", 20230616, 260000, "C"]
      operationId: get-v2-list-contracts-option
      description: |
        ## Behavior
        Lists all contracts that were traded or quoted on a particular date.
        List Contacts is updated real-time.
        If the ``root`` parameter is specified, the returned contracts will be filtered to match the root.
        Multiple roots can be specified by separating them with commas such as ``root=AAPL,SPY,AMD``
        This endpoint is updated real-time.

        ***Sample data contains partial output of the request as the full response to the request is too large to display on this webpage.***

        ## Throttle

        ***A mandatory 500 millisecond overhead is applied to this request*** to limit bandwidth consumption. This type of request should increase your overall throughput as you will know exactly what is available for each trading day. If the 500 millisecond overhead is an issue, please contact support and they can remove it depending on the circumstances.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.

        **List all traded contracts**

        [http://127.0.0.1:25510/v2/list/contracts/option/trade?start_date=20230512](http://127.0.0.1:25510/v2/list/contracts/option/trade?start_date=20230512)


        **List all quoted contracts**

        [http://127.0.0.1:25510/v2/list/contracts/option/quote?start_date=20230512](http://127.0.0.1:25510/v2/list/contracts/option/quote?start_date=20230512)


        **List all quoted contracts with root filter**

        [http://127.0.0.1:25510/v2/list/contracts/option/quote?start_date=20230512&root=AAPL,SPY](http://127.0.0.1:25510/v2/list/contracts/option/quote?start_date=20230512&root=AAPL,SPY)


        **List all open interest contracts**

        [http://127.0.0.1:25510/v2/list/contracts/option/open_interest?start_date=20230512](http://127.0.0.1:25510/v2/list/contracts/option/open_interest?start_date=20230512)

      parameters:
        - $ref: '#/components/parameters/req'
        - $ref: '#/components/parameters/root'
        - name: start_date
          in: query
          description: The date to list all contracts for. Formatted as YYYYMMDD.
          required: true
          schema:
            type: string
            default: '20230512'
            example: '20230512'
        - $ref: '#/components/parameters/use_csv'
      requestBody:
        content: {}


  /snapshot/stock/trade:
    x-min-subscription: standard
    get:
      summary: Trade Snapshot
      tags:
        - Stocks
        - Snapshots
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","sequence","ext_condition1","ext_condition2","ext_condition3","ext_condition4","condition","size","exchange","price","condition_flags","price_flags","volume_type","records_back","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The time of the EOD report. Milliseconds since 00:00:00.000 (midnight) ET.
                        sequence:
                          type: integer
                          description: The exchange [sequence](/Articles/Data-And-Requests/Making-Requests#trade-sequences).
                        ext_condition1:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition2:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition3:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition4:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        condition:
                          type: integer
                          description: The trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html).
                        size:
                          type: integer
                          description: The amount of contracts traded.
                        exchange:
                          type: integer
                          description: The [exchange](/Articles/Data-And-Requests/Values/Exchanges.html) the trade was executed.
                        price:
                          type: double
                          description: The trade price.
                        condition_flags:
                          type: integer
                          description: Future use. These fields can be ignored.
                        price_flags:
                          type: integer
                          description: Future use. These fields can be ignored.
                        volume_type:
                          type: integer
                          description: Future use. These fields can be ignored.
                        records_back:
                          type: integer
                          description: Non-zero for trade cancellations and insertions. The value represents the amount of trades prior to the current trade to delete or insert.
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
                      - [14400004,1,32,255,1,115,1,5,65,191.68,7,0,0,0,20240102]
                      - [14400004,2,32,255,1,115,1,20,65,191.68,7,0,0,0,20240102]
      operationId: get-v2-snapshot-stock-trade
      description: |
        ## Behavior

        - Returns a real-time last trade from the [Nasdaq Basic feed](/Articles/Data-And-Requests/The-SIPs) if the account has a [stocks standard or pro subscription](https://www.thetadata.net/subscribe#stocks).

        - Theta Data resets its snapshot cache at midnight ET every day. This endpoint may not work on a weekend where there were no eligible messages sent over exchange feeds. We recommend using historic requests during the weekend.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/snapshot/stock/trade?root=AAPL](http://127.0.0.1:25510/v2/snapshot/stock/trade?root=AAPL)
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/venue'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
  /snapshot/stock/quote:
    x-min-subscription: value
    get:
      summary: Quote Snapshot
      tags:
        - Stocks
        - Snapshots
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day", "bid_size", "bid_exchange", "bid", "bid_condition", "ask_size", "ask_exchange", "ask", "ask_condition", "date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The time of the EOD report. Milliseconds since 00:00:00.000 (midnight) ET.
                        bid_size:
                          type: integer
                          description: The last NBBO bid size.
                        bid_exchange:
                          type: integer
                          description: The last NBBO bid [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                        bid:
                          type: double
                          description: The last NBBO bid price.
                        bid_condition:
                          type: integer
                          description: The last NBBO bid [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                        ask_size:
                          type: integer
                          description: The last NBBO ask size.
                        ask_exchange:
                          type: integer
                          description: The last NBBO ask [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                        ask:
                          type: double
                          description: The last NBBO ask price.
                        ask_condition:
                          type: integer
                          description: The last NBBO ask [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
                      - [35100000,38,69,5.40,50,21,69,5.60,50,20231103]
                      - [36000000,24,60,5.35,50,31,60,5.50,50,20231103]
      operationId: get-v2-snapshot-stock-quote
      description: |
        ## Behavior
        - Returns a real-time last BBO quote from the [Nasdaq Basic feed](/Articles/Data-And-Requests/The-SIPs) if the account has a [stocks standard or pro subscription](https://www.thetadata.net/subscribe#stocks).
        - Returns a 15-minute delayed NBBO quote from the [UTP & CTA feeds](/Articles/Data-And-Requests/The-SIPs) account has the [stocks value subscription](https://www.thetadata.net/subscribe#stocks) subscription.
        - Theta Data resets its snapshot cache at midnight ET every day. This endpoint may not work on a weekend where there were no eligible messages sent over exchange feeds. We recommend using historic requests during the weekend.
        - [Want a snapshot for an entire chain?](/operations/get-v2-bulk_snapshot-stock-quote)

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/snapshot/stock/quote?root=AAPL](http://127.0.0.1:25510/v2/snapshot/stock/quote?root=AAPL)
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/venue'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
  /snapshot/stock/ohlc:
    x-min-subscription: value
    get:
      summary: OHLC Snapshot
      tags:
        - Stocks
        - Snapshots
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","open","high","low","close","volume","count","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The time of the EOD report. Milliseconds since 00:00:00.000 (midnight) ET.
                        open:
                          type: double
                          description: The opening trade price.
                        high:
                          type: double
                          description: The highest traded price.
                        low:
                          type: double
                          description: The lowest traded price.
                        close:
                          type: double
                          description: The closing traded price.
                        volume:
                          type: integer
                          description: The amount of contracts traded.
                        count:
                          type: integer
                          description: The amount of trades.
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
                      - [45000000,186.615000,186.670000,186.530000,186.540000,87758,1319,20240102]
                      - [45060000,186.540000,186.715000,186.530200,186.630000,92924,1125,20240102]
      operationId: get-v2-snapshot-stock-ohlc
      description: |
        ## Behavior

        - Returns a real-time session OHLC from the [Nasdaq Basic feed](/Articles/Data-And-Requests/The-SIPs) if the account has a [stocks standard or pro subscription](https://www.thetadata.net/subscribe#stocks).

        - Returns a 15-minute delayed session OHLC from the [UTP & CTA feeds](/Articles/Data-And-Requests/The-SIPs) account has the [stocks value subscription](https://www.thetadata.net/subscribe#stocks) subscription.

        - Theta Data resets its snapshot cache at midnight ET every day. This endpoint may not work on a weekend where there were no eligible messages sent over exchange feeds. We recommend using historic requests during the weekend.
        - [Want a snapshot for an entire chain?](/operations/get-v2-bulk_snapshot-stock-ohlc)

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/snapshot/stock/ohlc?root=AAPL](http://127.0.0.1:25510/v2/snapshot/stock/ohlc?root=AAPL)
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/venue'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"

  /bulk_snapshot/stock/quote:
    x-min-subscription: standard
    get:
      summary: Bulk Quote Snapshot
      tags:
        - Stocks
        - 'Bulk Snapshots'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contract objects, each containing tick data and contract details; ["ms_of_day","bid_size","bid_exchange","bid","bid_condition","ask_size","ask_exchange","ask","ask_condition","date"]
                    items:
                      type: object
                      properties:
                        ticks:
                          type: array
                          description: Array of tick data for the contract.
                          properties:
                            ms_of_day:
                              type: integer
                              description: Milliseconds since 00:00:00.000 (midnight) ET.
                            bid_size:
                              type: integer
                              description: The last BBO bid size.
                            bid_exchange:
                              type: string
                              description: The last BBO bid [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                            bid:
                              type: number
                              description: The last BBO bid price.
                            bid_condition:
                              type: string
                              description: The last BBO bid [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                            ask_size:
                              type: integer
                              description: The last BBO ask size.
                            ask_exchange:
                              type: string
                              description: The last BBO ask [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                            ask:
                              type: number
                              description: The last BBO ask price.
                            ask_condition:
                              type: string
                              description: The last BBO ask [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                            date:
                              type: integer
                              description: The date formated as YYYYMMDD.
                        contract:
                          type: object
                          description: Details of the contract associated with the ticks.
                          properties:
                            root:
                              type: string
                              description: The root symbol of the contract.
                    example:
                      - ticks:
                          - [70840632,100,29,469.0000,0,100,29,571.5000,0,20250129]
                        contract:
                          root: CVCO
                      - ticks:
                          - [72000032,100,29,22.9800,0,100,29,38.9800,0,20250129]
                        contract:
                          root: KLXY
      operationId: get-v2-bulk_snapshot-stock-quote
      description: |
        ## Behavior

        - Returns a real-time last BBO quote for every stock from the [Nasdaq Basic feed](/Articles/Data-And-Requests/The-SIPs) if the account has a [stocks standard or pro subscription](https://www.thetadata.net/subscribe#stocks).

        - Theta Data resets its snapshot cache at midnight ET every day. This endpoint may not work on a weekend where there were no eligible messages sent over exchange feeds. We recommend using historic requests during the weekend.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/bulk_snapshot/stock/quote?root=0](http://127.0.0.1:25510/v2/bulk_snapshot/stock/quote?root=0)


        ## Output Descriptions
        Field     | Description
        ----------|----------
        ms_of_day | The time of the EOD report. Milliseconds since 00:00:00.000 (midnight) ET.
        bid_size  | The last BBO bid size.
        bid_exchange | The last BBO bid [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
        bid       | The last BBO bid price.
        bid_condition | The last BBO bid [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
        ask_size  | The last BBO ask size.
        ask_exchange | The last BBO ask [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
        ask       | The last BBO ask price.
        ask_condition | The last BBO ask [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
        date      | The date formated as YYYYMMDD.
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
        - $ref: '#/components/parameters/venue'
  /bulk_snapshot/stock/ohlc:
    x-min-subscription: standard
    get:
      summary: Bulk OHLC Snapshot
      tags:
        - Stocks
        - 'Bulk Snapshots'
      responses:
        '200':
          description: OK
          content:
