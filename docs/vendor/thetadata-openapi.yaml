        ``ms_of_day`` represents the time of day the report was generated and ``ms_of_day2`` represents the time of the last trade.
        The quote in the response represents the last NBBO reported by OPRA at the time of report generation. 
        You can read more about EOD & OHLC data [here](/Articles/Data-And-Requests/OHLC-EOD).

        - Expected response time: ~1 minute
        - Expected File Size: ~150 MB


