components:
  schemas:
    header:
      type: object
      description: "The response to the request made. If there is a caught error, the error_type field won't be null."
      properties:
        id:
          type: integer
          format: int64
          description: The request id. This is incremented each time a request is made.
          readOnly: true
        latency_ms:
          type: integer
          description: The time in milliseconds it took for the server to respond to the request. This does not account for the time it takes the Theta Terminal to locally send the data over HTTP via this API.
        error_type:
          type: string
          description: 'The error type. If this field is null, no error occurred.'
        error_msg:
          type: string
          description: Additional information about the error if available.
        format:
          type: array
          items:
              type: string
          description: The order of fields in each inner array of the response.

  parameters:
    sec:
      name: sec
      in: path
      description: The security type.
      required: true
      schema:
        type: string
        enum:
          - option
          - stock
          - index
    req:
      name: req
      in: path
      description: The request type.
      required: true
      schema:
        type: string
        enum:
          - trade
          - quote
    root:
      name: root
      in: query
      required: true
      schema:
        type: string
        example: SPX
        minLength: 1
      description: 'The symbol of the security. Option underlyings for indices might have [special tickers](/Articles/Data-And-Requests/The-SIPs#index-option-symbology). '
    start_date:
      name: start_date
      in: query
      required: true
      schema:
        type: integer
        pattern: YYYYMMDD
        example: 20230915
        minLength: 8
        maxLength: 8
        format: date
      description: The start date (inclusive) of the request formatted as YYYYMMDD.
    end_date:
      name: end_date
      in: query
      required: true
      schema:
        type: integer
        pattern: YYYYMMDD
        minLength: 8
        maxLength: 8
        format: date
        example: 20230915
      description: The end date (inclusive) of the request formatted as YYYYMMDD.
    start_time:
      name: start_time
      in: query
      required: false
      schema:
        type: string
        example: '300000000'
        minLength: 0
      description: 'If specified, the response will include all ticks on or after this number of milliseconds since midnight ET.'
    end_time:
      name: end_time
      in: query
      required: false
      schema:
        type: string
      description: 'If specified, the response will include all ticks on or before this number of milliseconds since midnight ET.'
    use_csv:
      name: use_csv
      in: query
      required: false
      schema:
        type: boolean
        default: false
        example: false
      description: 'Output is in comma-separated values if `true`, legacy JSON if `false`.'
    ivl:
      name: ivl
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 3600000
        example: 900000
        default: 0
      description: The interval size in milliseconds. 1 minute intervals is ``60000``. Omitting this value or setting it to ``0``will provide tick-level data instead of aggregated / intervalized data.
    ivl_ohlc:
      name: ivl
      in: query
      required: true
      schema:
        type: integer
        minimum: 100
        maximum: 3600000
        example: 900000
      description: The interval size in milliseconds. 1 minute intervals is ``60000``.
    ivl_at_time:
      name: ivl
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 3600000
        example: 900000
        default: 0
      description: "The number of milliseconds since 00:00:00.000 ET. Example: 09:30:00 ET = ``34200000`` & 16:00:00 ET = ``57600000``."
    rth:
      name: rth
      in: query
      required: false
      schema:
        type: boolean
        default: true
        example: true
      description: 'If this value is set to ``false`` and the request is for aggregated / intervalized data, the response will contain intervals from 00:00:000 ET to 23:59:999 ET. If the ``ivl`` is ``0`` or is unspecified, then rth will be forced to ``false``. This means that all data for the day, even if it was outside regular trading hours would be returned.  The default behavior is to only return data during regular trading hours (09:30:00.000 ET to 16:00.000 ET).'
    venue:
      name: venue
      in: query
      required: false
      schema:
        type: string
        enum:
          - nqb
          - utp_cta
        default: nqb
      description: Used to specify the venue of the real time or historic request. ``nqb`` = Nasdaq Basic; ``utp_cta`` = merged UTP & CTA.
    exclusive:
      name: exclusive
      in: query
      required: false
      schema:
        type: boolean
        default: false
        example: true
      description: ' If you prefer to match quotes with timestamps that are < the trade timestamp, specify this  parameter to true. This parameter only works with the trade_quote endpoint.'
    exp:
      name: exp
      in: query
      schema:
        type: integer
        format: date
        example: 20231103
        minLength: 8
        maxLength: 8
        pattern: YYYYMMDD
      description: The expiration date of the option contract formatted as YYYYMMDD.
      required: true
    right:
      name: right
      in: query
      schema:
        type: string
        enum:
          - C
          - P
        example: C
        default: C
      description: The right of the option. 'C' for call; 'P' for put.
      required: true
    op_right:
      name: right
      in: query
      schema:
        type: string
        enum:
          - C
          - P
        example: C
        default: C
      description: The right of the option. 'C' for call; 'P' for put.
      required: false
    strike:
      name: strike
      in: query
      required: true
      schema:
        type: integer
        minLength: 1
        maxLength: 10
        example: 170000
      description: The strike price in 1/10th of a cent. A $170.00 strike price would be 170000.
    op_strike:
      name: strike
      in: query
      required: false
      schema:
        type: integer
        minLength: 1
        maxLength: 10
        example: 170000
      description: The strike price in 1/10th of a cent. A $170.00 strike price would be 170000.
    perf_boost:
      name: perf_boost
      in: query
      schema:
        type: boolean
        default: false
        example: true
      description: 'If true: 1 second intervals for the underlying equity will be used to calcualte the stock price at the time of each option trade instead of using  tick-level equity NBBO. This significantly improves performance as there are much less rows of data that have to be processed per request. This flag only works with the trade greeks endpoints.'
    annual_div:
      name: annual_div
      in: query
      required: false
      schema:
        type: number
        example: 4.24
        minimum: 0
      description: The annualized expected dividend amount to be used in Greeks calculations.
    under_price:
      name: under_price
      in: query
      schema:
        type: number
        format: double
        example: 190.42
        minimum: 0
      description: The underlying price to be used in the Greeks calculation for a snapshot.
      allowEmptyValue: false
    rate_value:
      name: rate_value
      in: query
      required: false
      schema:
        type: number
        format: double
        minimum: 0
      description: The annualized interest rate value to be used in a Greeks calculation. A 3.42% interest rate would be represented as .0342. This will override the ``rate`` parameter if it is specified.
    pretty_time:
      name: pretty_time
      in: query
      required: false
      schema:
        type: boolean
        default: false
        example: true
      description: 'If this value is set to ``true``, ms_of_day and date will take the format of 09:30:00.000 and 2020-01-01; if set to ``false``, ms_of_day will return the timestamp in milliseconds since midnight EST.'
    rate:
      name: rate
      in: query
      required: false
      schema:
        type: string
        enum:
          - SOFR
          - TREASURY_M1
          - TREASURY_M3
          - TREASURY_M6
          - TREASURY_Y1
          - TREASURY_Y2
          - TREASURY_Y3
          - TREASURY_Y5
          - TREASURY_Y7
          - TREASURY_Y10
          - TREASURY_Y20
          - TREASURY_Y30
        example: SOFR
      description: The interest rate type to be used in a Greeks calculation. Omitting this parameter will default to SOFR or 0 if no rate exists for the date in question.
