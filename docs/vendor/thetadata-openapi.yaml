      operationId: get-v2-flat-file-option-open-interest
      description: |
        ## Behavior

        Returns the data for all contracts that share the same provided root and expiration.
        Open Interest is reported by [OPRA](/Articles/Data-And-Requests/The-SIPs) at approximately 06:30 ET. A new open interest message might not be sent by [OPRA](/Articles/Data-And-Requests/The-SIPs) if there is no open interest for the option contract. The reported open interest represents the open interest at the end of the previous trading day.

        - Expected response time: ~1 minute
        - Expected File Size: ~50 MB


