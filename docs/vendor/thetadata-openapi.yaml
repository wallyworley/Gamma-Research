          description: OK
          content:
            text/plain:
              schema:
                type: string
                description: The connectivity status.
                enum:
                  - CONNECTED
                  - UNVERIFIED
                  - DISCONNECTED
                  - ERROR
      operationId: get-v2-system-mdds-status
      description: |
        ## Behavior

        - Returns the connectivity to Theta Data [MDDS](/Articles/Getting-Started/Introduction#market-data-distribution-server-mdds).

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.

        [http://127.0.0.1:25510/v2/system/mdds/status](http://127.0.0.1:25510/v2/system/mdds/status)

        Response      | Definition 
        --------------|--------------
         CONNECTED    | The terminal is connected.
         UNVERIFIED   | The terminal was able to connect but the credentials could not be authenticated.
         DISCONNECTED | The terminal is not connected to MDDS.
         ERROR        | Some undefined error occurred while making this request. Check terminal log.
