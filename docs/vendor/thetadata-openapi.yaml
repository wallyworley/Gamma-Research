  /hist/option/ohlc:
    get:
      summary: OHLC
      operationId: get-hist-option-ohlc
      description: |
        ## Behavior

        Aggregated OHLC bars that use [SIP rules](/Articles/Data-And-Requests/OHLC-EOD)
        for each bar. Time timestamp of the bar represents the opening time of the bar. For a
        trade to be part of the bar:  ``bar timestamp`` <= ``trade time`` < ``bar timestamp + ivl``, where ivl is the
        specified interval size in milliseconds.

        ## Sample URL & Code

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/hist/option/ohlc?root=AAPL&exp=20231103&strike=170000&right=C&start_date=20231103&end_date=20231103&ivl=900000](http://127.0.0.1:25510/v2/hist/option/ohlc?root=AAPL&exp=20231103&strike=170000&right=C&start_date=20231103&end_date=20231103&ivl=900000)
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/exp'
        - $ref: '#/components/parameters/strike'
        - $ref: '#/components/parameters/right'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/ivl_ohlc'
        - $ref: '#/components/parameters/rth'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/end_time'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","open","high","low","close","volume","count","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The opening time of the OHLC bar. Milliseconds since 00:00:00.000 (midnight) ET.
                        open:
