  /bulk_hist/option/eod:
    get:
      summary: Bulk EOD
      operationId: get-bulk_hist-option-eod
      description: |
        ## Behavior 

        Returns the data for all contracts that share the same provided root and expiration.
        Since [OPRA](/Articles/Data-And-Requests/The-SIPs) does not provide a national EOD 
        report for options, Theta Data generates a national EOD report at 17:15 ET each day.
         ``ms_of_day`` represents the time of day the report was generated and 
         ``ms_of_day2`` represents the time of the last trade. The quote in the response
          represents the last NBBO reported by OPRA at the time of report generation. 
          You can read more about EOD & OHLC data [here](/Articles/Data-And-Requests/OHLC-EOD).
           **Set ``exp`` to ``0`` if you want
         to retrieve data for every option that shares the same ``root``. (note: Any ``exp=0`` must be requested day by day)**

        ## Sample URL & Code

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/bulk_hist/option/eod?root=AAPL&exp=20231103&start_date=20231102&end_date=20231102](http://127.0.0.1:25510/v2/bulk_hist/option/eod?root=AAPL&exp=20231103&start_date=20231102&end_date=20231102)
        > The quote fields (bid / ask info) may not be available prior to 2023-12-01. We will expose further history for the EOD quote in the near future.
      parameters:
        - $ref: "#/components/parameters/root"
        - $ref: "#/components/parameters/exp"
        - $ref: "#/components/parameters/start_date"
        - $ref: "#/components/parameters/end_date"
        - $ref: "#/components/parameters/annual_div"
        - $ref: "#/components/parameters/rate"
        - $ref: "#/components/parameters/rate_value"
        - $ref: "#/components/parameters/use_csv"
        - $ref: "#/components/parameters/pretty_time"
      requestBody:
        content: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contract objects, each containing tick data and contract details; ["ms_of_day","ms_of_day2","open","high","low","close","volume","count","bid_size","bid_exchange","bid","bid_condition","ask_size","ask_exchange","ask","ask_condition","date"]
                    items:
                      type: object
                      properties:
                        ticks:
                          type: array
                          description: Array of tick data for the contract.
                          properties:
                            ms_of_day:
                              type: integer
                              description: The time of the EOD report. Milliseconds since 00:00:00.000 (midnight) ET.
                            ms_of_day2:
                              type: integer
                              description: The time of the closing trade . Milliseconds since 00:00:00.000 (midnight) ET.
                            open:
                              type: double
                              description: The opening trade price.
                            high:
                              type: double
                              description: The highest traded price.
                            low:
                              type: double
                              description: The lowest traded price.
                            close:
                              type: double
                              description: The closing traded price.
                            volume:
                              type: integer
                              description: The amount of contracts traded.
                            count:
                              type: integer
                              description: The amount of trades.
                            bid_size:
                              type: integer
                              description: The last NBBO bid size.
                            bid_exchange:
                              type: integer
                              description: The last NBBO bid [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                            bid:
                              type: double
                              description: The last NBBO bid price.
                            bid_condition:
                              type: integer
                              description: The last NBBO bid [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                            ask_size:
                              type: integer
                              description: The last NBBO ask size.
                            ask_exchange:
                              type: integer
                              description: The last NBBO ask [exchange](/Articles/Data-And-Requests/Values/Exchanges.html).
                            ask:
                              type: double
                              description: The last NBBO ask price.
                            ask_condition:
                              type: integer
                              description: The last NBBO ask [condition](/Articles/Data-And-Requests/Values/Quote-Conditions.html).
                            date:
                              type: integer
                              description: The date formated as YYYYMMDD.
                        contract:
                          type: object
                          description: Details of the contract associated with the ticks.
                          properties:
                            root:
                              type: string
                              description: The root symbol of the contract.
                            expiration:
                              type: integer
                              description: Expiration date of the contract in YYYYMMDD format.
                            strike:
                              type: integer
                              description: Strike price of the contract in minor units (e.g., 180000 means $180.00).
                            right:
                              type: string
                              description: Indicates whether the contract is a call or put option.
                              enum: [C, P]
                              example: C
                    example:
                      - ticks:
                          - [62573163,55073367,126.3500,127.6000,126.2000,127.6000,14,10,6,47,126.6000,50,1,7,129.6500,50,20231102]
                          - [63174002,55073367,126.3500,127.6000,126.2000,127.6000,14,10,6,47,126.6000,50,1,7,129.6500,50,20231102]
                        contract:
                          root: AAPL
                          expiration: 20240119
                          strike: 50000
                          right: C
                      - ticks:
                          - [62573163,0,0.0000,0.0000,0.0000,0.0000,0,0,0,22,0.0000,50,1,7,0.0100,50,20231102]
                          - [63174002,0,0.0000,0.0000,0.0000,0.0000,0,0,0,22,0.0000,50,1,7,0.0100,50,20231102]
                        contract:
                          root: AAPL
                          expiration: 20240119
                          strike: 50000
                          right: P
      tags:
        - Options
        - 'Bulk Historical Data'
    x-min-subscription: value
  /bulk_hist/option/quote:
    get:
      summary: Bulk Quote
      operationId: get-bulk_hist-option-quote
      description: |
        ## Behavior

        Returns the data for all contracts that share the same provided root and expiration.
         Returns every NBBO quote reported by [OPRA](/Articles/Data-And-Requests/The-SIPs). If the
        ``ivl`` parameter is specified, the quote for each interval represents the last quote
         at the interval's timestamp. We do not recommend omitting the ``ivl`` parameter
         as tick-level quote responses are very large, which can produce undefined behavior. To request tick-level data, make 
        single contract requests. Any ``ivl`` under ``60000`` is not officially supported. 
        We also do not recommend using a date range over 1 day. **Set ``exp`` to ``0`` if you want
         to retrieve data for every option that shares the same ``root``. This is only supported for 1 minute intervals (``ivl=60000``) (note: Any ``exp=0`` must be requested day by day)**

