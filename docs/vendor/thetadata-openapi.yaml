  /at_time/stock/trade:
    get:
      summary: Trade At Time
      operationId: get-at_time-stock-trade
      description: |
        ## Behavior
        #### Real-time request behavior:
        - Returns a real-time session from the [Nasdaq Basic feed](/Articles/Data-And-Requests/The-SIPs#nasdaq-basic) if the account has a [stocks standard or pro subscription](https://www.thetadata.net/subscribe#stocks).
        - Returns a 15-minute delayed session from the [UTP & CTA feeds](/Articles/Data-And-Requests/The-SIPs#equities-cta-utp) account has the [stocks value subscription](https://www.thetadata.net/subscribe#stocks) subscription.

        #### Historical request behavior:
        Returns the last trade reported by [UTP & CTA feeds](/Articles/Data-And-Requests/The-SIPs#equities-cta-utp) at a specified millisecond of the day.
        Trade condition mappings can be found [here](/Articles/Data-And-Requests/Values/Trade-Conditions.html).

        The ``ivl``parameter represents the milliseconds since 00:00:00.000 ET that the trade should be provided for.

        ## Sample URL & Code

        Paste the URL below into your browser while the Theta Terminal is running.

        [http://127.0.0.1:25510/v2/at_time/stock/trade?root=SPY&start_date=20240116&end_date=20240116&ivl=57600000](http://127.0.0.1:25510/v2/at_time/stock/trade?root=SPY&start_date=20240116&end_date=20240116&ivl=57600000)
      parameters:
        - $ref: "#/components/parameters/root"
        - $ref: "#/components/parameters/start_date"
        - $ref: "#/components/parameters/end_date"
        - $ref: "#/components/parameters/ivl_at_time"
        - $ref: "#/components/parameters/rth"
        - $ref: '#/components/parameters/venue'
        - $ref: "#/components/parameters/use_csv"
        - $ref: "#/components/parameters/pretty_time"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","sequence","ext_condition1","ext_condition2","ext_condition3","ext_condition4","condition","size","exchange","price","condition_flags","price_flags","volume_type","records_back","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The exchange timestamp of the trade (the time the trade was reported). Milliseconds since 00:00:00.000 (midnight) ET.
                        sequence:
                          type: integer
                          description: The exchange [sequence](/Articles/Data-And-Requests/Making-Requests#trade-sequences).
                        ext_condition1:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition2:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition3:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        ext_condition4:
                          type: integer
                          description: Additional trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html)(s). These can be ignored for options.
                        condition:
                          type: integer
                          description: The trade [condition](/Articles/Data-And-Requests/Values/Trade-Conditions.html).
                        size:
                          type: integer
                          description: The amount of contracts traded.
                        exchange:
                          type: integer
                          description: The [exchange](/Articles/Data-And-Requests/Values/Exchanges.html) the trade was executed.
                        price:
                          type: double
                          description: The trade price.
                        condition_flags:
                          type: integer
                          description: Future use. These fields can be ignored.
                        price_flags:
                          type: integer
                          description: Future use. These fields can be ignored.
                        volume_type:
                          type: integer
                          description: Future use. These fields can be ignored.
                        records_back:
                          type: integer
                          description: Non-zero for trade cancellations and insertions. The value represents the amount of trades prior to the current trade to delete or insert.
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
                      - [57600000,10146941,32,255,255,255,0,560,1,474.9500,0,1,0,0,20240116]
      tags:
        - Stocks
        - 'At Time'
    x-min-subscription: standard
