  /bulk_hist/option/ohlc:
    get:
      summary: Bulk OHLC
      operationId: get-bulk_hist-option-ohlc
      description: |
        ## Behavior

        Returns the data for all contracts that share the same provided root and expiration. Aggregated OHLC bars that use [SIP rules](/Articles/Data-And-Requests/OHLC-EOD) 
        for each bar. Time timestamp of the bar represents the opening time of the bar. For a
        trade to be part of the bar:  ``bar timestamp`` <= ``trade time`` < ``bar timestamp + ivl``, where ivl is the
        specified interval size in milliseconds.

        ## Sample URL & Code

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/bulk_hist/option/ohlc?root=AAPL&exp=20231103&start_date=20231103&end_date=20231103&ivl=900000](http://127.0.0.1:25510/v2/bulk_hist/option/ohlc?root=AAPL&exp=20231103&start_date=20231103&end_date=20231103&ivl=900000)

      parameters:
