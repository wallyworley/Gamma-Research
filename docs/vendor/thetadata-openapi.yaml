    get:
      summary: Implied Volatility
      operationId: get-hist-option-implied_volatility
      description: |
        ## Behavior

        Returns implied volatilies calculated using the national best bid, mid, and ask price
        of the option respectively. The underlying price represents whatever the last underlying price was at the
        ``ms_of_day`` field. You can read more about how Theta Data calculates greeks 
        [here](/Articles/Data-And-Requests/Option-Greeks).

        ## Sample URL & Code

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/hist/option/implied_volatility?root=AAPL&exp=20230915&strike=170000&right=C&start_date=20230911&end_date=20230911](http://127.0.0.1:25510/v2/hist/option/implied_volatility?root=AAPL&exp=20230915&strike=170000&right=C&start_date=20230911&end_date=20230911)

      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/exp'
        - $ref: '#/components/parameters/strike'
        - $ref: '#/components/parameters/right'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/ivl'
        - $ref: '#/components/parameters/rth'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","bid","bid_implied_vol","midpoint","implied_vol","ask","ask_implied_vol","iv_error","ms_of_day2","underlying_price","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The exchange timestamp or interval time of the option quote. Milliseconds since 00:00:00.000 (midnight) ET.
                        bid:
                          type: number
                          format: double
                          description: The national best bid price.
                        bid_implied_vol:
                          type: number
                          format: double
                          description: The implied volatiltiy calculated using the bid price.
                        midpoint:
                          type: number
                          format: double
                          description: The midpoint calculated by averaging the bid & ask prices.
                        implied_vol:
                          type: number
                          format: double
                          description: The implied volatiltiy calculated using the mid price.
                        ask:
                          type: number
                          format: double
                          description: The national best offer price.
                        ask_implied_vol:
                          type: number
                          format: double
                          description: The implied volatiltiy calculated using the ask price.
                        iv_error:
                          type: number
                          format: double
                          description: |
