                          description: The lowest traded price.
                        close:
                          type: double
                          description: The closing traded price.
                        volume:
                          type: integer
                          description: The amount of contracts traded.
                        count:
                          type: integer
                          description: The amount of trades.
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
