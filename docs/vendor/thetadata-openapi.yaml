      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "C:\\Users\\userName\\ThetaData\\ThetaTerminal\\downloads\\OPTION-TRADE_QUOTE-20250512.csv"
      operationId: get-v2-flat-file-option-trade-quote
      description: |
        ## Behavior

        Returns the data for all contracts that share the same provided root and expiration. 
        Returns every [trade](/operations/get-hist-option-trade) reported by [OPRA](/Articles/Data-And-Requests/The-SIPs) paired with the last NBBO quote reported by [OPRA](/Articles/Data-And-Requests/The-SIPs) at the time of trade.
        A quote is matched with a trade if its timestamp ``<`` the trade timestamp.

        - Expected response time: ~3 minutes
        - Expected File Size: ~1.2 GB


        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/file/option/trade_quote?start_date=20250512](http://127.0.0.1:25510/v2/file/option/trade_quote?start_date=20250512)

