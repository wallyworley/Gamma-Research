                      - [62507968,57748000,4201.27,4245.64,4197.74,4237.86,0,0,0,0,0.00,0,0,0,0.00,0,20231101]
                      - [63082563,57748000,4201.27,4245.64,4197.74,4237.86,0,0,0,0,0.00,0,0,0,0.00,0,20231101]
      operationId: get-v2-hist-index-eod
      description: |
        ## Behavior
        - Since [the indices feeds](/Articles/Data-And-Requests/The-SIPs) do not provide a national EOD report, Theta Data generates a national EOD report at 17:15 each day.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/hist/index/eod?root=SPX&start_date=20231101&end_date=20231115](http://127.0.0.1:25510/v2/hist/index/eod?root=SPX&start_date=20231101&end_date=20231115)

      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
    x-min-subscription: free
  /hist/index/ohlc:
    x-min-subscription: standard
    get:
      summary: OHLC
      tags:
        - Indices
        - Historical
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","open","high","low","close","volume","count","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The time of the report. Milliseconds since 00:00:00.000 (midnight) ET.
                        open:
                          type: double
                          description: The opening trade price.
                        high:
                          type: double
                          description: The highest traded price.
                        low:
                          type: double
                          description: The lowest traded price.
                        close:
                          type: double
                          description: The closing traded price.
                        volume:
                          type: integer
                          description: The amount of contracts traded.
                        count:
                          type: integer
                          description: The amount of trades.
                        date:
                          type: integer
                          format: date
                          description: The date formated as YYYYMMDD.
                    example:
                      - [34200000,4745.20,4745.20,4738.63,4742.78,0,0,20240102]
                      - [34260000,4742.96,4743.28,4741.36,4743.28,0,0,20240102]
      operationId: get-v2-hist-index-ohlc
      description: |
        ## Behavior
        - Aggregated OHLC bars that use [SIP rules](/Articles/Data-And-Requests/OHLC-EOD) for each bar. Time timestamp of the bar represents the opening time of the bar.
        - For a trade to be part of the bar:  ``bar time`` <= ``trade time`` < ``bar timestamp + ivl``, where ivl is the specified interval size in milliseconds. 
        - [Exchanges](/Articles/Data-And-Requests/The-SIPs) typically generate a price report every second for popular indices like SPX.

        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/hist/index/ohlc?root=SPX&start_date=20240102&end_date=20240102&ivl=60000](http://127.0.0.1:25510/v2/hist/index/ohlc?root=SPX&start_date=20240102&end_date=20240102&ivl=60000)
      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/ivl_ohlc'
        - $ref: '#/components/parameters/rth'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/end_time'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
  /hist/index/price:
    get:
      summary: Price
      tags:
        - Indices
        - Historical
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/header"
                  response:
                    type: array
                    description: A list of contracts, where each item is an array of values matching the `header.format`; ["ms_of_day","price","date"]
                    items:
                      type: array
                      properties:
                        ms_of_day:
                          type: integer
                          description: The time of the price report.Milliseconds since 00:00:00.000 (midnight) ET.
                        price:
                          type: number
                          format: double
                          description: The reported price of the index.
                        date:
                          type: integer
                          format: date
                          description: The date the price report was generated formatted as YYYYMMDD. 
                    example:
                      - [34200000,0.0,20240102]
                      - [35100000,4735.27,20240102]
      operationId: get-v2-hist-index-price
      description: |
        ## Behavior

        - Retrieves historical indices price reports. [Exchanges](/Articles/Data-And-Requests/The-SIPs) typically generate a price report every second for popular indices like SPX.
        - The highest granularity data available is returned if the ``ivl`` parameter isn't specified.
        - When the ``ivl`` parameter is specified, the returned data represents the price at the exact time of each timestamp. If the timestamp in the response is 10:30:00, the price field represents the price at that exact time of the day.
        - A price update from the exchange is omitted if the price remained the same from the previous update.


        ## Sample URL

        Paste the URL below into your browser while the Theta Terminal is running.


        [http://127.0.0.1:25510/v2/hist/index/price?root=SPX&start_date=20240102&end_date=20240102&ivl=900000](http://127.0.0.1:25510/v2/hist/index/price?root=SPX&start_date=20240102&end_date=20240102&ivl=900000)

      parameters:
        - $ref: '#/components/parameters/root'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/ivl'
        - $ref: '#/components/parameters/rth'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/end_time'
        - $ref: '#/components/parameters/use_csv'
        - $ref: "#/components/parameters/pretty_time"
      requestBody:
        content: {}
    x-min-subscription: value

  /file/getting-started:
